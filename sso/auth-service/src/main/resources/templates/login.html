<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SSO Login</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui; max-width: 400px; margin: 80px auto; padding: 20px; }
        h1 { color: #333; }
        input { width: 100%; padding: 10px; margin: 8px 0; }
        button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        .error { color: #dc2626; margin: 8px 0; }
    </style>
</head>
<body>
    <h1>SSO Login</h1>
    <p th:if="${param.error}" class="error">Sai username hoặc password.</p>
    <form method="post" action="/auth/login">
        <input type="hidden" name="redirect_uri" th:value="${redirectUri}">
        <input type="text" name="username" placeholder="Username" required autofocus>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    <p style="margin-top: 20px; color: #666;">Demo: admin / admin123</p>
</body>
</html>
