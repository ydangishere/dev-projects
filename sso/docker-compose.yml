version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sso_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./auth-service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sso_auth
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  app-a:
    build: ./app-a
    ports:
      - "8081:8081"
    environment:
      APP_AUTH_SERVICE_URL: http://localhost:8080
      APP_CALLBACK_URL: http://localhost:8081/callback

  app-b:
    build: ./app-b
    ports:
      - "8082:8082"
    environment:
      APP_AUTH_SERVICE_URL: http://localhost:8080
      APP_CALLBACK_URL: http://localhost:8082/callback
