# Render.com — deploy for a public webhook URL
# Docs: https://render.com/docs/web-services
services:
  - type: web
    name: shopify-automation
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SHOPIFY_WEBHOOK_SECRET
        sync: false
      - key: PORT
        value: 3000
