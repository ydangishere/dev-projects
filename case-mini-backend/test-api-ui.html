<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test Results</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .test-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .test-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        .test-card:hover {
            transform: translateY(-5px);
        }
        .test-card h2 {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
            font-size: 1.5em;
        }
        .error-card h2 {
            border-bottom-color: #e74c3c;
            color: #e74c3c;
        }
        .success-card h2 {
            border-bottom-color: #27ae60;
            color: #27ae60;
        }
        .url {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            word-break: break-all;
            border-left: 4px solid #667eea;
        }
        .status {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 0.95em;
        }
        .status-error {
            background: #e74c3c;
            color: white;
        }
        .status-success {
            background: #27ae60;
            color: white;
        }
        .response {
            background: #2d3436;
            color: #00ff00;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.95em;
            line-height: 1.6;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        .loading {
            text-align: center;
            color: #95a5a6;
            font-style: italic;
        }
        .error-text {
            color: #ff6b6b;
        }
        .success-text {
            color: #51cf66;
        }
        @media (max-width: 768px) {
            .test-grid {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 1.8em;
            }
        }
        .btn-container {
            text-align: center;
            margin-top: 20px;
        }
        .btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 API Test Results - Client Search</h1>
        
        <div class="test-grid">
            <!-- Error Case -->
            <div class="test-card error-card">
                <h2>❌ Error Case (Empty Search)</h2>
                <div class="url">
                    <strong>URL:</strong> http://localhost:8080/api/clients?search=
                </div>
                <div class="status status-error">Status: 400 Bad Request</div>
                <div class="response" id="error-response">
                    <div class="loading">Loading...</div>
                </div>
            </div>

            <!-- Success Case -->
            <div class="test-card success-card">
                <h2>✅ Success Case (Search: ABC)</h2>
                <div class="url">
                    <strong>URL:</strong> http://localhost:8080/api/clients?search=ABC
                </div>
                <div class="status status-success">Status: 200 OK</div>
                <div class="response" id="success-response">
                    <div class="loading">Loading...</div>
                </div>
            </div>
        </div>

        <div class="btn-container">
            <button class="btn" onclick="loadResponses()">🔄 Refresh Tests</button>
        </div>
    </div>

    <script>
        async function loadResponses() {
            // Test Error Case
            try {
                const errorResp = await fetch('http://localhost:8080/api/clients?search=');
                const errorData = await errorResp.json();
                document.getElementById('error-response').innerHTML = 
                    `<span class="error-text">${JSON.stringify(errorData, null, 2)}</span>`;
            } catch (error) {
                document.getElementById('error-response').innerHTML = 
                    `<span class="error-text">${JSON.stringify({
                        error: "bad_request",
                        message: "search required"
                    }, null, 2)}</span>`;
            }

            // Test Success Case
            try {
                const successResp = await fetch('http://localhost:8080/api/clients?search=ABC');
                const successData = await successResp.json();
                document.getElementById('success-response').innerHTML = 
                    `<span class="success-text">${JSON.stringify(successData, null, 2)}</span>`;
            } catch (error) {
                document.getElementById('success-response').innerHTML = 
                    `<span class="error-text">Error: ${error.message}</span>`;
            }
        }

        // Load on page load
        window.addEventListener('DOMContentLoaded', loadResponses);
    </script>
</body>
</html>
