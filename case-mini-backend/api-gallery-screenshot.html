<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Gallery – GET request (chụp màn hình thay Swagger)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 24px;
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            color: #a5d6ff;
        }
        .hint {
            font-size: 0.9rem; color: #888; margin-bottom: 20px;
        }
        .block {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #0f3460;
        }
        .label {
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;
            color: #7f8c8d; margin-bottom: 6px;
        }
        .url {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.95rem;
            word-break: break-all;
            background: #0f3460;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .status {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }
        .status.ok { background: #27ae60; color: #fff; }
        .status.err { background: #c0392b; color: #fff; }
        .json {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85rem;
            background: #0d1117;
            color: #7ee787;
            padding: 16px;
            border-radius: 8px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .input-row { margin-bottom: 12px; }
        .input-row label { display: inline-block; width: 100px; }
        .input-row input { width: 320px; padding: 8px; border-radius: 6px; border: 1px solid #0f3460; background: #16213e; color: #eee; }
        button {
            background: #0f3460;
            color: #a5d6ff;
            border: 1px solid #1a1a2e;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
        }
        button:hover { background: #1a3a5c; }
    </style>
</head>
<body>
    <h1>1) Postman request/response (thay cho Swagger)</h1>
    <p class="hint">Gọi 1 endpoint GET → Chụp màn hình có URL + status 200 + JSON response.</p>

    <div class="block">
        <div class="input-row">
            <label>Base URL:</label>
            <input type="text" id="baseUrl" value="https://case-mini-backend.onrender.com" />
        </div>
        <div class="input-row">
            <label>Endpoint:</label>
            <input type="text" id="endpoint" value="/api/cases" />
        </div>
        <button onclick="callApi()">Gọi GET</button>
    </div>

    <div class="block">
        <div class="label">URL</div>
        <div class="url" id="displayUrl">—</div>
        <div class="label">Status</div>
        <div id="displayStatus"><span class="status ok">200 OK</span></div>
        <div class="label" style="margin-top:12px">JSON response</div>
        <div class="json" id="displayJson">Nhấn "Gọi GET" để tải.</div>
    </div>

    <script>
        async function callApi() {
            const base = (document.getElementById('baseUrl').value || '').replace(/\/$/, '');
            const path = (document.getElementById('endpoint').value || '/api/cases').replace(/^\//, '');
            const url = base + '/' + path;
            document.getElementById('displayUrl').textContent = url;
            const statusEl = document.getElementById('displayStatus');
            const jsonEl = document.getElementById('displayJson');
            try {
                const res = await fetch(url, { method: 'GET', headers: { 'Accept': 'application/json' } });
                const text = await res.text();
                let data;
                try { data = JSON.parse(text); } catch (_) { data = text; }
                statusEl.innerHTML = '<span class="status ' + (res.ok ? 'ok' : 'err') + '">' + res.status + ' ' + (res.statusText || '') + '</span>';
                jsonEl.textContent = typeof data === 'object' ? JSON.stringify(data, null, 2) : data;
            } catch (e) {
                statusEl.innerHTML = '<span class="status err">Error</span>';
                jsonEl.textContent = 'Lỗi: ' + e.message + '\n\n(Kiểm tra CORS nếu gọi từ file:// hoặc domain khác.)';
            }
        }
    </script>
</body>
</html>
